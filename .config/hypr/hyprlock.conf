auth {
    fingerprint:enabled = true
    fingerprint:ready_message =  Scan fingerprint to unlock
    fingerprint:present_message = 󰂰  Scanning...
}

background {
    monitor =
    path = screenshot
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 3
    blur_size = 8
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 0.9)
    font_size = 120
    font_family = FiraCode Nerd Font ExtraBold
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(255, 255, 255, 0.8)
    font_size = 22
    font_family = FiraCode Nerd Font
    position = 0, 70
    halign = center
    valign = center
    shadow_passes = 1
}

label {
    monitor =
    text = Welcome back, $USER
    color = rgba(255, 255, 255, 0.9)
    font_size = 16
    font_family = FiraCode Nerd Font
    position = 0, -30
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1

    # Frosted glass effect for the box
    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(0, 0, 0, 0.4)
    font_color = rgba(255, 255, 255, 0.9)

    fade_on_empty = false
    placeholder_text = 󰟵   |  
    hide_input = false

    check_color = rgba(137, 180, 250, 0.9)
    fail_color = rgba(243, 139, 168, 0.9)
    capslock_color = rgba(250, 179, 135, 0.9)

    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>

    position = 0, -100
    halign = center
    valign = center
    shadow_passes = 2
}

label {
    monitor =
    text = $FPRINTPROMPT
    color = rgba(255, 255, 255, 0.6)
    font_size = 14
    font_family = FiraCode Nerd Font
    position = 0, -160
    halign = center
    valign = center
}
